[package]
name = "stryke-zmq"
version = "0.17.0"
description = "ZeroMQ client for stryke. Brokerless messaging — req/rep, pub/sub, push/pull, dealer/router, pair — over a persistent in-process socket registry. cdylib loaded on first `use Zmq`; libzmq vendored, no system dependency."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-zmq"
edition = "2026"

[ffi]
lib-name = "stryke_zmq"
namespace = "Zmq"
exports = [
    "zmq__pkg_version",
    "zmq__lib_version",
    "zmq__has",
    "zmq__socket",
    "zmq__close",
    "zmq__bind",
    "zmq__connect",
    "zmq__unbind",
    "zmq__disconnect",
    "zmq__send",
    "zmq__send_multipart",
    "zmq__recv",
    "zmq__recv_multipart",
    "zmq__subscribe",
    "zmq__unsubscribe",
    "zmq__set",
    "zmq__get",
    "zmq__poll",
    "zmq__poll_many",
    "zmq__monitor",
    "zmq__monitor_recv",
    "zmq__proxy",
    "zmq__curve_keypair",
    "zmq__curve_public",
    "zmq__valid_curve_key",
    "zmq__z85_encode",
    "zmq__z85_decode",
    "zmq__z85_valid",
    "zmq__request",
    "zmq__parse_endpoint",
    "zmq__build_endpoint",
    "zmq__endpoint_bind_to_connect",
    "zmq__endpoint_connect_to_bind",
    "zmq__valid_endpoint",
    "zmq__topic_match",
    "zmq__topic_overlaps",
    "zmq__prune_subscriptions",
    "zmq__parse_monitor_event",
    "zmq__topic_match_any",
    "zmq__valid_socket_type",
    "zmq__socket_peers",
    "zmq__socket_types_compatible",
    "zmq__socket_caps",
    "zmq__socket_types",
    "zmq__socket_type_id",
    "zmq__socket_caps_all",
    "zmq__encoding_names",
    "zmq__socket_event_names",
    "zmq__monitor_event_flag",
    "zmq__subscription_diff",
    "zmq__io_threads",
    "zmq__capabilities",
    "zmq__events",
    "zmq__recv_more",
    "zmq__socket_pair",
    "zmq__drain",
    "zmq__sendrecv",
    "zmq__socket_count",
    "zmq__socket_option_names",
    "zmq__valid_socket_option",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
